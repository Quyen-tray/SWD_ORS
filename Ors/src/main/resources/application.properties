spring.application.name=Ors

# ===== DataSource (SQL Server) =====
# Sửa username/password theo máy mình, đừng commit creds thật.
spring.datasource.url=jdbc:sqlserver://localhost:1433; DatabaseName=OnlineRecruitmentSystem; encrypt=true; trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=12
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===== JPA / Hibernate =====
# update: Hibernate tự tạo/sửa bảng theo entity.
# Đổi 'validate' nếu đã chạy docs/db.sql để tạo schema tay.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8080
server.servlet.context-path=/api/v1

# ===== Custom app config =====
# Generate a random 256-bit base64 secret, e.g. via:
#   openssl rand -base64 64

# Moderation (Slice B): cross.Iam.auth chưa có AuthController/login thật, nên tạm dùng
# id cố định của user MODERATOR có sẵn trong seed-demo-data.sql làm "moderator hiện tại".
# Xem CurrentModeratorResolver để biết cách thay bằng JWT thật sau này.
app.moderation.default-moderator-id=4

# ===== Custom email config =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=group1projecthms@gmail.com
spring.mail.password=isie qifk ciyn lhiu
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# ===== Custom env config =====
spring.config.import=optional:file:.env[.properties]
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=2592000000
